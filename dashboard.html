<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PerfectBot Dashboard</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b1220,#0f172a);
    color: white;
}

.header {
    background: #020617;
    padding: 20px;
    font-size: 26px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #020617;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.value {
    font-size: 28px;
    margin-top: 5px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #f59e0b; }

button {
    padding: 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    margin: 5px;
    cursor: pointer;
    width: 45%;
}

.start { background: #22c55e; color: white; }
.stop { background: #ef4444; color: white; }
.refresh { background: #3b82f6; color: white; }
.emergency { background: #f59e0b; color: white; }
.ai { background: #8b5cf6; color: white; }

.logs {
    background: black;
    height: 200px;
    overflow-y: scroll;
    padding: 10px;
    font-size: 12px;
}

</style>

</head>
<body>

<div class="header">
PerfectBot Professional Dashboard
</div>

<div class="container">

<div class="card">
Status:
<div id="status" class="value yellow">Loading...</div>
</div>

<div class="card">
Balance:
<div id="balance" class="value">$0</div>
</div>

<div class="card">
Profit Today:
<div id="profit" class="value green">$0</div>
</div>

<div class="card">

<button class="start" onclick="startBot()">START BOT</button>

<button class="stop" onclick="stopBot()">STOP BOT</button>

<button class="refresh" onclick="update()">REFRESH</button>

<button class="emergency" onclick="emergency()">EMERGENCY CLOSE</button>

<button class="ai" onclick="toggleAI()">AI ON / OFF</button>

</div>

<div class="card">
Logs:
<div id="logs" class="logs"></div>
</div>

</div>

<script>

function log(text)
{
    let logs = document.getElementById("logs")
    logs.innerHTML += text + "<br>"
    logs.scrollTop = logs.scrollHeight
}

function update()
{
    fetch("/status")
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("status").innerHTML =
        data.status=="online"
        ? "<span class='green'>ONLINE</span>"
        : "<span class='red'>OFFLINE</span>"

        document.getElementById("balance").innerHTML =
        "$"+data.balance.toFixed(2)

        document.getElementById("profit").innerHTML =
        "$"+data.profit_today

        log("Dashboard updated")

    })
}

function startBot()
{
    fetch("/start",{method:"POST"})
    log("Bot started")
}

function stopBot()
{
    fetch("/stop",{method:"POST"})
    log("Bot stopped")
}

function emergency()
{
    log("Emergency close requested")
}

function toggleAI()
{
    log("AI toggled")
}

setInterval(update,3000)

update()

</script>

</body>
</html>
