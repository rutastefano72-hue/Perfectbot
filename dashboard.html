<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>PerfectBot Terminal</title><style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
}

.sidebar{
width:200px;
background:#020617;
height:100vh;
padding:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
}

.start{background:#16a34a;}
.stop{background:#dc2626;}
.refresh{background:#2563eb;}
.settings{background:#7c3aed;}

.main{
flex:1;
padding:25px;
}

.top{
display:flex;
gap:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
flex:1;
}

.value{
font-size:22px;
margin-top:8px;
font-weight:bold;
}

.section{
margin-top:25px;
background:#020617;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #1f2937;
text-align:left;
}

input{
background:#0b1220;
border:1px solid #1f2937;
color:white;
padding:6px;
border-radius:6px;
width:80px;
margin-right:8px;
}

button.small{
padding:6px 10px;
font-size:12px;
border-radius:6px;
}
</style></head><body><div class="sidebar"><h2>PerfectBot</h2><button class="start" onclick="startBot()">START BOT</button>
<button class="stop" onclick="stopBot()">STOP BOT</button>
<button class="refresh" onclick="loadData()">REFRESH</button>
<button class="settings" onclick="toggleSettings()">SETTINGS</button>

</div><div class="main"><div class="top"><div class="card">
Balance
<div id="balance" class="value">$0.00</div>
</div><div class="card">
Status
<div id="status" class="value">offline</div>
</div></div><div class="section"><h3>Live Trades</h3><table>
<thead>
<tr>
<th>Symbol</th>
<th>Side</th>
<th>Entry</th>
<th>PNL</th>
<th>Action</th>
</tr>
</thead><tbody id="liveTradesTable">
<tr>
<td colspan="5">Loading...</td>
</tr>
</tbody></table></div><div class="section" id="settingsPanel" style="display:none;"><h3>Settings</h3>Leverage
<input id="setLeverage">
<button class="small" onclick="saveLeverage()">Save</button>

<br><br>

TP %
<input id="setTP">
<button class="small" onclick="saveTP()">Save</button>

<br><br>

SL %
<input id="setSL">
<button class="small" onclick="saveSL()">Save</button>

<br><br>

Capital %
<input id="setCapital">
<button class="small" onclick="saveCapital()">Save</button>

</div></div><script>

async function loadData(){

try{

// STATUS
let res = await fetch("/status");
let data = await res.json();

document.getElementById("balance").innerText =
"$" + parseFloat(data.balance || 0).toFixed(2);

document.getElementById("status").innerText =
data.status || "offline";

// set values
document.getElementById("setLeverage").value = data.leverage || 5;
document.getElementById("setTP").value = data.take_profit || 4;
document.getElementById("setSL").value = data.stop_loss || 2;
document.getElementById("setCapital").value =
Math.round((data.capital_percent || 0.05) * 100);

// POSITIONS
let posRes = await fetch("/get_open_positions");
let positions = await posRes.json();
  if(!positions) positions = [];

let table = document.getElementById("liveTradesTable");
table.innerHTML="";

if(!positions || positions.length === 0){

table.innerHTML=`
<tr>
<td colspan="5">No open trades</td>
</tr>
`;

return;
}

positions.forEach(pos=>{

let pnl = parseFloat(pos.pnl || 0);
let color = pnl >= 0 ? "#00ff88" : "#ff4d4d";

table.innerHTML+=`
<tr>
<td>${pos.symbol}</td>
<td>${pos.side}</td>
<td>${pos.entry}</td>
<td style="color:${color}; font-weight:bold;">
${pnl.toFixed(4)}
</td>
<td>
<button class="small" onclick="closeTrade('${pos.symbol}')">
Close
</button>
</td>
</tr>
`;

});

}catch(e){
console.log("LOAD ERROR:",e);
}

}

async function startBot(){
await fetch("/start",{method:"POST"});
loadData();
}

async function stopBot(){
await fetch("/stop",{method:"POST"});
loadData();
}

async function saveLeverage(){
let value=document.getElementById("setLeverage").value;
await fetch("/set_leverage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({value:value})
});
}

async function saveTP(){
let value=document.getElementById("setTP").value;
await fetch("/set_take_profit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({value:value})
});
}

async function saveSL(){
let value=document.getElementById("setSL").value;
await fetch("/set_stop_loss",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({value:value})
});
}

async function saveCapital(){
let value=document.getElementById("setCapital").value;
await fetch("/set_capital_percent",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({percent:parseFloat(value)/100})
});
}

async function closeTrade(symbol){

await fetch("/close_trade",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({symbol:symbol})
});

loadData();
}

function toggleSettings(){
let panel=document.getElementById("settingsPanel");
panel.style.display =
panel.style.display==="none"?"block":"none";
}

loadData();
setInterval(loadData,3000);

</script></body>
</html>
