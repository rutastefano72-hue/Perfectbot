<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>PerfectBot Professional</title><style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
}

.sidebar{
width:70px;
background:#050a18;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:15px;
}

.btn{
width:50px;
height:50px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.start{background:#16a34a;}
.stop{background:#dc2626;}
.refresh{background:#2563eb;}
.emergency{background:#f59e0b;}
.ai{background:#7c3aed;}
.telegram{background:#229ED9;}

.main{
flex:1;
padding:20px;
}

.top{
display:flex;
gap:20px;
}

.card{
background:#050a18;
padding:20px;
border-radius:10px;
min-width:200px;
}

.value{
font-size:24px;
margin-top:10px;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.section{
margin-top:20px;
background:#050a18;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #1f2937;
text-align:left;
}

input{
background:#0b1220;
border:1px solid #1f2937;
color:white;
padding:5px;
width:80px;
border-radius:5px;
}

canvas{
background:#050a18;
border-radius:10px;
}

</style></head><body><div class="sidebar"><button class="btn start" onclick="startBot()">▶</button>
<button class="btn stop" onclick="stopBot()">■</button>
<button class="btn refresh" onclick="loadData()">⟳</button>
<button class="btn emergency">!</button>
<button class="btn ai">AI</button>
<button class="btn telegram">TG</button>

</div><div class="main"><h2>PerfectBot Professional</h2><div class="top"><div class="card">
Balance
<div id="balance" class="value">$0</div>
</div><div class="card">
Profit Today
<div id="profitToday" class="value green">$0</div>
</div><div class="card">
Profit Total
<div id="profitTotal" class="value green">$0</div>
</div><div class="card">
Status
<div id="status" class="value">offline</div>
</div></div><div class="section"><h3>Controls</h3>Leverage
<input id="leverage" value="5">

TP %
<input id="tp" value="4">

SL %
<input id="sl" value="2">

Capital %
<input id="capital" value="10">

</div><div class="section"><h3>Live Trades</h3><table>
<thead>
<tr>
<th>Symbol</th>
<th>Side</th>
<th>Entry</th>
<th>Profit</th>
</tr>
</thead><tbody id="trades">
<tr>
<td>—</td>
<td>—</td>
<td>—</td>
<td>—</td>
</tr>
</tbody></table></div><div class="section"><h3>Trade History</h3><table>
<thead>
<tr>
<th>Symbol</th>
<th>Result</th>
<th>Profit</th>
</tr>
</thead><tbody id="history">
<tr>
<td>—</td>
<td>—</td>
<td>—</td>
</tr>
</tbody></table></div><div class="section"><h3>Performance</h3><canvas id="chart" height="100"></canvas>

</div></div><script>

async function loadData(){

let res=await fetch("/status");
let data=await res.json();

document.getElementById("balance").innerText="$"+data.balance;
document.getElementById("profitToday").innerText="$"+data.profit_today;
document.getElementById("profitTotal").innerText="$"+data.profit_total;
document.getElementById("status").innerText=data.status;

}

async function startBot(){

await fetch("/start",{method:"POST"});
loadData();

}

async function stopBot(){

await fetch("/stop",{method:"POST"});
loadData();

}

loadData();
setInterval(loadData,5000);

</script></body>
</html>
