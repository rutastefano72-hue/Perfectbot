<!DOCTYPE html>
<html>
<head>
    <title>PerfectBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #0b132b;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        .card {
            background-color: #1c2541;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            font-size: 24px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            color: white;
        }

        .start {
            background-color: green;
        }

        .stop {
            background-color: red;
        }
    </style>
</head>
<body>

<h1>PerfectBot</h1>

<div class="card">Balance: <span id="balance">Loading...</span></div>
<div class="card">Profit Today: <span id="profit_today">Loading...</span></div>
<div class="card">Profit Total: <span id="profit_total">Loading...</span></div>
<div class="card">Status: <span id="status">Loading...</span></div>

<button class="start" onclick="startBot()">START BOT</button>
<button class="stop" onclick="stopBot()">STOP BOT</button>

<script>

async function loadStatus() {
    const res = await fetch("/status");
    const data = await res.json();

    document.getElementById("balance").innerText = data.balance;
    document.getElementById("profit_today").innerText = data.profit_today;
    document.getElementById("profit_total").innerText = data.profit_total;
    document.getElementById("status").innerText = data.status;
}

async function startBot() {
    await fetch("/start", {method:"POST"});
    loadStatus();
}

async function stopBot() {
    await fetch("/stop", {method:"POST"});
    loadStatus();
}

loadStatus();

</script>

</body>
</html>
