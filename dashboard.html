<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PerfectBot AI Terminal</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0a0f1c;
    color:#e0e6ff;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:220px;
    background:linear-gradient(180deg,#0f1629,#070b14);
    height:100vh;
    padding:20px;
    box-shadow:0 0 20px #00ffcc33;
}

.sidebar h2{
    color:#00ffc3;
    text-shadow:0 0 10px #00ffc3;
    margin-bottom:30px;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#10192e;
    border:1px solid #00ffc333;
    border-radius:8px;
    color:#00ffc3;
    cursor:pointer;
    transition:0.3s;
}

.sidebar button:hover{
    background:#00ffc320;
    box-shadow:0 0 10px #00ffc3;
}

/* MAIN */

.main{
    flex:1;
    padding:30px;
}

.top{
    display:flex;
    gap:20px;
}

.card{
    flex:1;
    background:#0f1629;
    padding:20px;
    border-radius:12px;
    border:1px solid #00ffc320;
    box-shadow:0 0 15px #00ffc310;
}

.card h3{
    color:#00ffc3;
    margin:0;
}

.value{
    font-size:26px;
    margin-top:10px;
    font-weight:bold;
}

/* SECTIONS */

.section{
    margin-top:30px;
    background:#0f1629;
    padding:20px;
    border-radius:12px;
    border:1px solid #00ffc320;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
}

th{
    color:#00ffc3;
    text-align:left;
    padding-bottom:10px;
}

td{
    padding:10px 0;
    border-bottom:1px solid #1c2744;
}

/* STATUS */

.online{
    color:#00ff88;
    text-shadow:0 0 10px #00ff88;
}

.offline{
    color:#ff4d4d;
    text-shadow:0 0 10px #ff4d4d;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>PerfectBot AI</h2>

<button onclick="startBot()">START</button>
<button onclick="stopBot()">STOP</button>
<button onclick="loadData()">REFRESH</button>

</div>

<div class="main">

<div class="top">

<div class="card">
<h3>Balance</h3>
<div id="balance" class="value">0</div>
<div id="balance_eur" style="opacity:0.7; margin-top:5px;">≈ 0 EUR</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="value offline">offline</div>
</div>

<div class="card">
<h3>AI Layer</h3>
<div class="value">ACTIVE</div>
</div>

</div>

<div class="section">
<h3>Live Trades</h3>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Side</th>
<th>Entry</th>
<th>PNL</th>
<th>NET</th>
</tr>
</thead>

<tbody id="liveTradesTable">
<tr>
<td colspan="5">No trades</td>
</tr>
</tbody>
</table>

</div>

</div>

<script>

async function loadData(){

    let res = await fetch("/status");
    let data = await res.json();

    // BALANCE USDT
    document.getElementById("balance").innerText =
        data.balance.toFixed(2) + " USDT";

    // CONVERSIONE EUR
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=eur")
    .then(res => res.json())
    .then(priceData => {
        let eurRate = priceData.tether.eur;
        let eurValue = data.balance * eurRate;
        document.getElementById("balance_eur").innerText =
            "≈ " + eurValue.toFixed(2) + " EUR";
    });

    // STATUS BOT
    let statusEl = document.getElementById("status");

    if(data.status === "online"){
        statusEl.innerText = "ONLINE";
        statusEl.className = "value online";
    }else{
        statusEl.innerText = "OFFLINE";
        statusEl.className = "value offline";
    }

    // POSIZIONI APERTE
    let posRes = await fetch("/get_open_positions");
    let positions = await posRes.json();

    let table = document.getElementById("liveTradesTable");
    table.innerHTML = "";

    if(!positions || positions.length === 0){
        table.innerHTML = "<tr><td colspan='5'>No trades</td></tr>";
        return;
    }

    positions.forEach(pos => {

        let pnl = parseFloat(pos.pnl);
        let net = parseFloat(pos.net_pnl);

        let pnlColor = pnl >= 0 ? "#00ff88" : "#ff4d4d";
        let pnlGlow = pnl >= 0 ? "0 0 8px #00ff88" : "0 0 8px #ff4d4d";

        let netColor = net >= 0 ? "#00ddff" : "#ff9900";
        let netGlow = net >= 0 ? "0 0 8px #00ddff" : "0 0 8px #ff9900";

        table.innerHTML += `
        <tr>
            <td>${pos.symbol}</td>
            <td>${pos.side}</td>
            <td>${pos.entry}</td>
            <td style="color:${pnlColor}; text-shadow:${pnlGlow}; font-weight:bold">
                ${pnl.toFixed(4)}
            </td>
            <td style="color:${netColor}; text-shadow:${netGlow}; font-weight:bold">
                ${net.toFixed(4)}
            </td>
        </tr>
        `;
    });

}

async function startBot(){
    await fetch("/start",{method:"POST"});
    loadData();
}

async function stopBot(){
    await fetch("/stop",{method:"POST"});
    loadData();
}

loadData();
setInterval(loadData,3000);

</script>

</body>
</html>
